<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>南昌市八一中学（南昌中学三经路校区）真题收录</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* 额外加一点精美样式 */
      .paper-card {
        background: #fff;
        padding: 20px;
        margin-bottom: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .paper-info h3 {
        margin: 0 0 8px 0;
        color: #2c3e50;
      }
      .tag {
        background: #e1f5fe;
        color: #0288d1;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🎒 南昌市八一中学历年真题库（不分年级）</h1>
      <p style="color: #666; margin-top: 5px">纯静态免登录版 · 数据实时更新</p>
    </header>

    <div class="container">
      <h2>选择历年真题卷</h2>
      <div id="papers-list">
        <p style="color: #999">正在加载真题数据...</p>
      </div>
    </div>

    <script>
      // 🚀 核心改动：不再请求后台接口，而是直接读取同目录下的 papers.json 静态文件！
      async function loadPapers() {
        try {
          // 注意这里直接读取本地的 papers.json
          const res = await fetch("papers.json");
          if (!res.ok) throw new Error("无法读取真题数据");
          const papers = await res.json();

          const listDiv = document.getElementById("papers-list");
          listDiv.innerHTML = ""; // 清空提示文字

          if (papers.length === 0) {
            listDiv.innerHTML = "<p>暂无试卷数据</p >";
            return;
          }

          papers.forEach((paper) => {
            const card = document.createElement("div");
            card.className = "paper-card";
            card.innerHTML = `
                        <div class="paper-info">
                            <h3>${paper.title}</h3>
                            <span class="tag">${paper.year}年</span>
                            <span class="tag" style="background:#e8f5e9; color:#388e3c;">${paper.subject}</span>
                        </div>
                        <div>
                            <a href=" " class="btn">开始看题</a >
                        </div>
                    `;
            listDiv.appendChild(card);
          });
        } catch (err) {
          document.getElementById("papers-list").innerHTML =
            `<p style="color:red;">加载失败: ${err.message}</p >`;
        }
      }

      // 页面加载时自动运行
      window.onload = loadPapers;
    </script>
  </body>
</html>
